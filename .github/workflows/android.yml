name: Build Android APK

on:
  push:
    branches: [ "main" ]
    paths:
      - 'composeApp/**'
      - 'androidApp/**'
      - 'gradle/**'
      - 'build.gradle.kts'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'composeApp/**'
      - 'androidApp/**'
      - 'gradle/**'
      - 'build.gradle.kts'

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Lockbox-debug.apk
          path: androidApp/build/outputs/apk/debug/CashbackHome-debug.apk
